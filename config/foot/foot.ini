[main]
include=/home/marcus/.config/foot/dank-colors.ini
pad = 5x0 center
selection-target=clipboard
term=xterm-256color
login-shell=yes

font=JetBrainsMono Nerd Font:size=8
dpi-aware=yes
bold-text-in-bright=yes



[colors]
alpha=0.95


[environment]
# name=value

[security]
osc52=enabled

[bell]
urgent=yes
notify=yes
visual=yes
command=notify-send
command-focused=no

[desktop-notifications]
command=notify-send --wait --app-name ${app-id} --icon ${app-id} --category ${category} --urgency ${urgency} --expire-time ${expire-time} --hint STRING:image-path:${icon} --hint BOOLEAN:suppress-sound:${muted} --hint STRING:sound-name:${sound-name} --replace-id ${replace-id} ${action-argument} --print-id -- ${title} ${body}
command-action-argument=--action ${action-name}=${action-label}
close=""
inhibit-when-focused=yes


[scrollback]
lines=5000

[url]
launch=xdg-open ${url}
label-letters=sadfjklewcmpgh
osc8-underline=url-mode
regex=(((https?://|mailto:|ftp://|file:|ssh:|ssh://|git://|tel:|magnet:|ipfs://|ipns://|gemini://|gopher://|news:)|www\.)([0-9a-zA-Z:/?#@!$&*+,;=.~_%^\-]+|\([]\["0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*\)|\[[\(\)"0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*\]|"[]\[\(\)0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*"|'[]\[\(\)0-9a-zA-Z:/?#@!$&*+,;=.~_%^\-]*')+([0-9a-zA-Z/#@$&*+=~_%^\-]|\([]\["0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*\)|\[[\(\)"0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*\]|"[]\[\(\)0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*"|'[]\[\(\)0-9a-zA-Z:/?#@!$&*+,;=.~_%^\-]*'))

[regex:nix-fail]
regex=(/nix/store/[0-9a-z]{32}-[^/]+\.drv)
launch=foot nix log ${match}

[regex:git-hashes]
regex=([a-fA-F0-9]{7,40})      # Manual: documented regex format


[regex:path]
regex=([\/.~]?(([^ ~'"`\\?*|;<>&┐─┘└┌│]{3,}\/[^ ~'"`\\?*|;<>&┐─┘└┌│]*(:\d+(:\d+)?)?)|([^ ~'"`\\?*|;<>&┐─┘└┌│]{3,}\.\w{2,}(:\d+(:\d+)?)?)))


[cursor]
beam-thickness=2
blink = no


[mouse]
hide-when-typing=yes
alternate-scroll-mode=no

[touch]
# long-press-delay=400

[key-bindings]
scrollback-up-page=Shift+Page_Up Shift+KP_Page_Up
# scrollback-up-half-page=none
# scrollback-up-line=none
scrollback-down-page=Shift+Page_Down Shift+KP_Page_Down
# scrollback-down-half-page=none
# scrollback-down-line=none
# scrollback-home=none
# scrollback-end=none
